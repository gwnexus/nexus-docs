[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
  # Pin to 5.14.7 — versions >=5.15.x require _global-error.meta which
  # Next.js 16 + staticGenerationRetryCount:0 does not generate due to
  # the React 19 useContext(null) SSG prerender bug in @mdx-js/react.
  [plugins.inputs]
    version = "5.14.7"

[[redirects]]
  from  = "https://nexus-docs.netlify.app/*"
  to    = "https://docs.nexus.gatewarden.eu/:splat"
  status = 301
  force  = true

[[redirects]]
  from  = "http://docs.nexus.gatewarden.eu/*"
  to    = "https://docs.nexus.gatewarden.eu/:splat"
  status = 301
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "DENY"
    Referrer-Policy           = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
